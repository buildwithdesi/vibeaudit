name: "Morning Scan"

on:
  schedule:
    # 7:00 AM Central Time (UTC-5 / UTC-6 depending on DST)
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      top:
        description: "Number of repos to scan (0 = all)"
        required: false
        default: "0"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Run morning scan
        env:
          GITHUB_TOKEN: ${{ secrets.SCAN_TOKEN }}
        run: |
          node scripts/morning-scan.js \
            --top "${{ github.event.inputs.top || '0' }}" \
            --format markdown || true

      # Reports enumerate security findings across many repos, so they are NOT
      # committed to this public repo. They are retained only as a private
      # GitHub Actions artifact (visible to repo collaborators, not the public).
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: morning-scan-${{ github.run_id }}
          path: reports/
          retention-days: 90
