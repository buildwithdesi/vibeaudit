      #     SUMMARY=$(head -20 report.md)
      #     curl -s -X POST "$SLACK_WEBHOOK_URL" \
      #       -H 'Content-Type: application/json' \
      #       -d "{\"text\": \"⚗️ Morning Vibe Audit\\n\\n\`\`\`${SUMMARY}\`\`\`\"}"
