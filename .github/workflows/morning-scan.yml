name: Morning Vibe Audit — Fleet Scan

on:
  schedule:
    # Every weekday at 7:00 AM UTC (adjust to your timezone)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      config:
        description: 'Path to batch config file'
        default: 'batch-config.json'
        type: string

permissions:
  contents: read

jobs:
  fleet-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run fleet scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONFIG="${{ github.event.inputs.config || 'batch-config.json' }}"
          node bin/vibe-audit.js --batch "$CONFIG" --format html --batch-out vibe-audit-batch.html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vibe-audit-fleet-report
          path: vibe-audit-batch.html
          retention-days: 30

      - name: Run fleet scan (JSON for downstream)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONFIG="${{ github.event.inputs.config || 'batch-config.json' }}"
          node bin/vibe-audit.js --batch "$CONFIG" --format json > vibe-audit-batch.json

      - name: Upload JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vibe-audit-fleet-json
          path: vibe-audit-batch.json
          retention-days: 30
