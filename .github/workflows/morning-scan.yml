name: "Morning Vibe Audit — Multi-Repo Scan"

on:
  schedule:
    # 8:00 AM UTC every weekday (adjust for your timezone)
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      org:
        description: "GitHub org or user to scan"
        required: false
        type: string
      repos_file:
        description: "Path to repos JSON file (relative to repo root)"
        required: false
        type: string
        default: "repos.json"
      topic:
        description: "Filter repos by GitHub topic"
        required: false
        type: string
      concurrency:
        description: "Parallel scan concurrency"
        required: false
        type: number
        default: 5
      format:
        description: "Output format"
        required: false
        type: choice
        options:
          - markdown
          - json
          - terminal
        default: markdown

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: "20"

jobs:
  scan:
    name: "Multi-repo security scan"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine scan target
        id: target
        run: |
          # Priority: workflow_dispatch inputs > env defaults
          ORG="${{ inputs.org || env.VIBEAUDIT_ORG || '' }}"
          REPOS_FILE="${{ inputs.repos_file || 'repos.json' }}"
          TOPIC="${{ inputs.topic || env.VIBEAUDIT_TOPIC || '' }}"
          CONCURRENCY="${{ inputs.concurrency || '5' }}"
          FORMAT="${{ inputs.format || 'markdown' }}"

          if [ -n "$ORG" ]; then
            echo "mode=org" >> "$GITHUB_OUTPUT"
            echo "org=$ORG" >> "$GITHUB_OUTPUT"
          elif [ -f "$REPOS_FILE" ]; then
            echo "mode=file" >> "$GITHUB_OUTPUT"
            echo "repos_file=$REPOS_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No --org or repos.json found. Set VIBEAUDIT_ORG secret or add repos.json."
            exit 1
          fi

          echo "topic=$TOPIC" >> "$GITHUB_OUTPUT"
          echo "concurrency=$CONCURRENCY" >> "$GITHUB_OUTPUT"
          echo "format=$FORMAT" >> "$GITHUB_OUTPUT"

      - name: Run multi-repo scan
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.VIBEAUDIT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""

          if [ "${{ steps.target.outputs.mode }}" = "org" ]; then
            ARGS="--org ${{ steps.target.outputs.org }}"
          else
            ARGS="--repos ${{ steps.target.outputs.repos_file }}"
          fi

          if [ -n "${{ steps.target.outputs.topic }}" ]; then
            ARGS="$ARGS --topic ${{ steps.target.outputs.topic }}"
          fi

          ARGS="$ARGS --concurrency ${{ steps.target.outputs.concurrency }}"
          ARGS="$ARGS --format ${{ steps.target.outputs.format }}"

          echo "Running: node bin/vibe-audit.js $ARGS"

          # Capture report output (stdout), let progress go to stderr
          node bin/vibe-audit.js $ARGS > report.md 2>&1 || EXIT_CODE=$?

          echo "exit_code=${EXIT_CODE:-0}" >> "$GITHUB_OUTPUT"

          # Store report for the issue step
          {
            echo "REPORT<<VIBEAUDIT_EOF"
            cat report.md
            echo "VIBEAUDIT_EOF"
          } >> "$GITHUB_ENV"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-audit-report-${{ github.run_number }}
          path: report.md
          retention-days: 90

      - name: Create/update tracking issue
        if: steps.scan.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `⚗️ Vibe Audit — Critical findings (${new Date().toISOString().split('T')[0]})`;
            const body = process.env.REPORT || 'Scan completed but report was empty.';

            // Check for an existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'vibe-audit',
              per_page: 1,
            });

            if (issues.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body,
              });
              console.log(`Updated issue #${issues[0].number}`);
            } else {
              // Create new issue
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['vibe-audit'],
              });
              console.log(`Created issue #${issue.number}`);
            }

      - name: Close tracking issue if clean
        if: steps.scan.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'vibe-audit',
              per_page: 1,
            });

            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                state: 'closed',
                state_reason: 'completed',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: '✅ All clear — no critical findings in the latest scan.',
              });
              console.log(`Closed issue #${issues[0].number}`);
            }

      - name: Fail on criticals
        if: steps.scan.outputs.exit_code != '0'
        run: exit 1
