name: "⚗️ Vibe Audit — Morning Batch Scan"

on:
  schedule:
    # Weekdays at 8:00 AM UTC (adjust to your timezone)
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      org:
        description: "GitHub org to scan (leave empty to use repos.txt)"
        required: false
        type: string
      format:
        description: "Output format"
        required: false
        default: "markdown"
        type: choice
        options:
          - terminal
          - json
          - markdown
      concurrency:
        description: "Parallel scans"
        required: false
        default: "5"
        type: string

permissions:
  contents: read
  issues: write

jobs:
  batch-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run batch audit
        id: audit
        env:
          GITHUB_TOKEN: ${{ secrets.AUDIT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ORG="${{ inputs.org || '' }}"
          FORMAT="${{ inputs.format || 'markdown' }}"
          CONCURRENCY="${{ inputs.concurrency || '5' }}"

          ARGS=""
          if [ -n "$ORG" ]; then
            ARGS="--org $ORG"
          elif [ -f repos.txt ]; then
            ARGS="--file repos.txt"
          else
            echo "::error::No org specified and no repos.txt found"
            exit 1
          fi

          node bin/vibe-audit-batch.js $ARGS \
            --format "$FORMAT" \
            --concurrency "$CONCURRENCY" \
            > batch-report.md 2>&1 || true

          # Also generate JSON for the summary
          node bin/vibe-audit-batch.js $ARGS \
            --format json \
            --concurrency "$CONCURRENCY" \
            > batch-report.json 2>&1 || true

          # Extract summary stats for the step output
          TOTAL=$(jq -r '.summary.scanned' batch-report.json 2>/dev/null || echo "0")
          CRITS=$(jq -r '.summary.totalCritical' batch-report.json 2>/dev/null || echo "0")
          WARNS=$(jq -r '.summary.totalWarnings' batch-report.json 2>/dev/null || echo "0")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "criticals=$CRITS" >> "$GITHUB_OUTPUT"
          echo "warnings=$WARNS" >> "$GITHUB_OUTPUT"

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibe-audit-batch-report
          path: |
            batch-report.md
            batch-report.json
          retention-days: 30

      - name: Create issue on critical findings
        if: steps.audit.outputs.criticals != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('batch-report.md', 'utf8');
            const criticals = '${{ steps.audit.outputs.criticals }}';
            const total = '${{ steps.audit.outputs.total }}';

            // Truncate report if too long for an issue body
            const maxLen = 60000;
            const body = report.length > maxLen
              ? report.slice(0, maxLen) + '\n\n...(truncated, see artifact for full report)'
              : report;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚗️ Batch Audit: ${criticals} critical findings across ${total} repos`,
              body: body,
              labels: ['security', 'vibe-audit'],
            });
